<style>

.header{
  color:white;
  background:black
}
  
body{background:#000.9}
  
.menu-circular{
display:flex;
overflow-x:auto;
gap:20px;
padding:15px;
}

#campoBusqueda {
  width: 100%;
  max-width: 400px;
  padding: 12px 16px;
  border: 2px solid #D4AF37;
  border-radius: 8px;
  background-color: #1a1a1a;
  color: #ffffff;
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  outline: none;
  transition: border-color 0.3s ease;
}

#campoBusqueda:focus {
  border-color: #FFD700;
  box-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
}

#campoBusqueda::placeholder {
  color: #999999;
}

#resultadosBusqueda {
  max-width: 400px;
  margin-top: 4px;
  background-color: #1a1a1a;
  border: 1px solid #D4AF37;
  border-radius: 8px;
  overflow: hidden;
  max-height: 300px;
  overflow-y: auto;
  position: absolute;
  z-index: 1000;
}

.resultado-item {
  display: block;
  padding: 10px 16px;
  color: #ffffff;
  text-decoration: none;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  border-bottom: 1px solid #333333;
  transition: background-color 0.2s ease;
}

.resultado-item:last-child {
  border-bottom: none;
}

.resultado-item:hover {
  background-color: #D4AF37;
  color: #000000;
}

.circle{
min-width:90px;
text-align:center;
text-decoration:none;
color:black;
}

.circle img{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
transition:.3s;
}

.circle:hover img{
transform:scale(1.1);
}
hero{
position:relative;
}

.hero img{
width:100%;
display:block;
}

.texto-hero{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.texto-hero h2{
font-size:100px;
text-align:center
}

.texto-hero p{
color:pink;
font-size:30px;
text-align:center
}

/* hero banner */
.hero-banner {
  position: relative;
  width: 100%;
  height: 300px;
  overflow: hidden;
}

.hero-img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 1.5s ease-in-out;
}

.hero-img.activa {
  opacity: 1;
}
 
 /* categorias */
 
.categorias{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:15px;
}

.card{
position:relative;
overflow:hidden;
border-radius:10px;
aspect-ratio:1/1;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
transition:.4s;
}

.card:hover img{
transform:scale(1.05);
}

.card::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.35);
}

.titulo{
position:absolute;
bottom:15px;
width:100%;
text-align:2px;
color:white;
text-shadow: 5px 5px 5px gold;
font-weight:bold;
font-size:22px;
z-index:2;
}

.about-button{
text-align: center;
font-size: 20px;
}

a:hover{
  color:black;
}


.whatsapp{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
text-decoration:none;
color:white;
}

.social{
display:flex;
justify-content:center;
gap:20px;
font-size:28px;
padding:20px;
}

@media(min-width:768px){

.categorias{
grid-template-columns:repeat(4,1fr);
}

<script>
  let indiceHero = 0;
  const imagenesHero = document.querySelectorAll('.hero-img');

  setInterval(() => {
    imagenesHero[indiceHero].classList.remove('activa');
    indiceHero = (indiceHero + 1) % imagenesHero.length;
    imagenesHero[indiceHero].classList.add('activa');
  }, 4000);
</script>
