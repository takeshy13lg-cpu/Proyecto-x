<style>

.header{
  color:white;

}
  
body{background:#000.9}
  
.menu-circular{
display:flex;
overflow-x:auto;
gap:20px;
padding:15px;
}

.circle{
min-width:90px;
text-align:center;
text-decoration:none;
color:black;
}

.circle img{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
transition:.3s;
}

.circle:hover img{
transform:scale(1.1);
}
hero{
position:relative;
}

.hero img{
width:100%;
display:block;
}

.texto-hero{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.texto-hero h2{
font-size:100px;
text-align:center
}

.texto-hero p{
color:pink;
font-size:30px;
text-align:center
}

 
.categorias{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:15px;
}

.card{
position:relative;
overflow:hidden;
border-radius:10px;
aspect-ratio:1/1;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
transition:.4s;
}

.card:hover img{
transform:scale(1.05);
}

.card::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.35);
}

.titulo{
position:absolute;
bottom:15px;
width:100%;
text-align:2px;
color:white;
text-shadow: 5px 5px 5px gold;
font-weight:bold;
font-size:22px;
z-index:2;
}

.about-button{
text-align: center;
font-size: 20px;
}

a:hover{
  color:black;
}


.whatsapp{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
text-decoration:none;
color:white;
}

.social{
display:flex;
justify-content:center;
gap:20px;
font-size:28px;
padding:20px;
}

@media(min-width:768px){

.categorias{
grid-template-columns:repeat(4,1fr);
}

footer{
background:black;
color:white;
padding:30px;
text-align:center;
}



}
</style>
