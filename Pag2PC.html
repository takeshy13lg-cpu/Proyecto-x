<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sport Life</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

/* HEADER */

.header{
position:sticky;
top:0;
background:#fff;
height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
border-bottom:1px solid #ddd;
z-index:1000;
}

.back,
.search{
font-size:28px;
text-decoration:none;
color:black;
}

.titulo{
text-align:center;
flex:1;
}

.tienda{
font-size:22px;
font-weight:bold;
}

.producto-header{
font-size:13px;
color:#666;
}

/* GALERIA */

.slider{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
scroll-behavior:smooth;
}

.slider::-webkit-scrollbar{
display:none;
}

.slide{
min-width:100%;
scroll-snap-align:start;
}

.slide img{
width:100%;
display:block;
cursor:pointer;
}

/* MINIATURAS */

.miniaturas{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
}

.miniaturas::-webkit-scrollbar{
display:none;
}

.miniaturas img{
width:80px;
height:80px;
object-fit:cover;
border:2px solid #ddd;
border-radius:5px;
cursor:pointer;
}

/* INFORMACION */

.info{
padding:20px;
}

.modelo{
font-size:25px;
font-weight:bold;
margin-bottom:10px;
}

.precio{
font-size:25px;
font-weight:bold;
margin-bottom:20px;
}

.tallas{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.talla{
padding:10px 20px;
border:1px solid #000;
border-radius:5px;
cursor:pointer;
}

.descripcion{
line-height:1.6;
color:#555;
}

/* PANTALLA COMPLETA */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
justify-content:center;
align-items:center;
z-index:9999;
}

.modal img{
max-width:100%;
max-height:100%;
}

.cerrar{
position:absolute;
top:20px;
right:20px;
font-size:40px;
color:white;
cursor:pointer;
}

.btn-whatsapp{
display:block;
width:100%;
background:#25D366;
color:white;
text-align:center;
padding:16px;
margin-top:25px;
border-radius:8px;
text-decoration:none;
font-size:18px;
font-weight:bold;
transition:0.3s;
}

.btn-whatsapp:hover{
transform:scale(1.02);
}


@media (min-width:992px){
.producto-pc{display:flex;gap:50px;max-width:1400px;margin:40px auto;align-items:flex-start;padding:0 30px;}
.galeria{flex:1;position:sticky;top:90px;}
.info{flex:1;padding:0;}
.slide{display:flex;justify-content:center;align-items:center;background:#f5f5f5;border-radius:12px;}
.slide img{width:100%;max-width:700px;max-height:700px;object-fit:contain;}
.miniaturas{justify-content:center;}
.modelo{font-size:34px;}
.precio{font-size:32px;}
.btn-whatsapp{max-width:420px;}
}

</style>
</head>
<body>

<!-- HEADER -->

<div class="header">

<a href="Pag1.html" class="back" onclick="volverInicio(Pag1.html); return false;">
<svg width="28" height="28" viewBox="0 0 24 24" fill="none">
<path d="M15 18L9 12L15 6"
stroke="black"
stroke-width="2.5"
stroke-linecap="round"
stroke-linejoin="round"/>
</svg>
</a>

<div class="titulo">
<div class="tienda">SPORT LIFE</div>
<div class="producto-header">
Toronto Blue Jays 
</div>
</div>

<a href="Index.html" class="search">🏠</a>

</div>

<!-- FOTO GRANDE -->

<div class="producto-pc">
<div class="galeria">
<div class="slider" id="slider">

<div class="slide">
<img src="Beisbol/Toronto.jpg" onclick="expandir(this.src)">
</div>

<div class="slide">
<img src="Beisbol/BJ.jpg" onclick="expandir(this.src)">
</div>

<div class="slide">
<img src="Beisbol/Bluejays.jpg" onclick="expandir(this.src)">
</div> 
 
<div class="slide">
<img src="imagenes/PR3.jpg" onclick="expandir(this.src)">
</div>

</div>

<!-- MINIATURAS -->

<div class="miniaturas">

<img src="Beisbol/Toronto.jpg" onclick="irFoto(0)">

<img src="Beisbol/BJ.jpg" onclick="irFoto(1)">

<img src="Beisbol/Bluejays.jpg" onclick="irFoto(2)">

<img src="imagenes/PR3.jpg" onclick="irFoto(3)">

</div>

</div>
<!-- INFORMACION -->

<div class="info">

<div class="modelo">
Toronto Blue Jays Vladimir Guerrero #27
</div>

<div class="precio">
$40.00
</div>

<h3>Tallas</h3>

<div class="tallas">

<!--<div class="talla"></div>

<div class="talla">XL</div>

<div class="talla"></div>-->

<div class="talla">XL</div>

</div>

<a
href="https://wa.me/5363156903?text=Hola,%20estoy%20interesado%20en%20la%20camisa%20de%20Toronto%2059FIFTY"
class="btn-whatsapp">

🛒 Comprar por WhatsApp

</a>

<div class="descripcion">

camisa oficial estilo deportivo.
Material premium, ajuste cómodo y diseño
urbano ideal para uso diario.

</div>

</div>
</div>

<!-- MODAL -->

<div class="modal" id="modal">

<span class="cerrar" onclick="cerrarModal()">
×
</span>

<img id="imagenExpandida">

</div>

<script>

function irFoto(numero){

document.getElementById("slider")
.scrollTo({
left: numero * window.innerWidth,
behavior:"smooth"
});

}

function expandir(src){

document.getElementById("modal").style.display="flex";

document.getElementById("imagenExpandida").src=src;

}

function cerrarModal(){

document.getElementById("modal").style.display="none";

}

function volverInicio(){
window.location.replace("Index.html");
}
</script>
</body>
</html>
